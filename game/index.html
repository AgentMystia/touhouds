<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>东方夜雀求生记</title>
<style>
  @font-face {
    font-family: 'Zpix';
    src: url('assets/fonts/zpix-subset.woff2') format('woff2');
    font-display: swap;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0612; }
  canvas { display: block; cursor: crosshair; }
  #loading {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 18px;
    background: radial-gradient(ellipse at center, #241536 0%, #0a0612 100%);
    color: #e0c8f0; font-family: 'Zpix', 'WenQuanYi Zen Hei', sans-serif;
    transition: opacity 0.6s; z-index: 10; pointer-events: none;
  }
  #loading .note { font-size: 44px; animation: bob 1.2s ease-in-out infinite; }
  #loading .t { font-size: 22px; letter-spacing: 6px; }
  @keyframes bob { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-12px) } }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="loading"><div class="note">♪</div><div class="t">夜雀降临中……</div></div>
<script type="module">
  import './src/main.js';
  const l = document.getElementById('loading');
  setTimeout(() => { l.style.opacity = '0'; setTimeout(() => l.remove(), 700); }, 500);
</script>
</body>
</html>
